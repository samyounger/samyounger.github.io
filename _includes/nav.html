<nav class="pageTop {{ include.section }}{% if page.layout == "post" %} post-page-nav{% endif %}" aria-label="Primary navigation">
  {% if page.layout == "post" %}
  <ul class="post-nav">
    <li>
      {% if page.previous %}
      <a href="{{ page.previous.url }}" aria-label="Previous post: {{ page.previous.title }}">
        <span aria-hidden="true">&larr;</span>
      </a>
      {% else %}
      <span class="post-nav-disabled" aria-hidden="true">&larr;</span>
      {% endif %}
    </li>
    <li>
      <a href="/blog" class="navbar-brand">All Posts</a>
    </li>
    <li>
      {% if page.next %}
      <a href="{{ page.next.url }}" aria-label="Next post: {{ page.next.title }}">
        <span aria-hidden="true">&rarr;</span>
      </a>
      {% else %}
      <span class="post-nav-disabled" aria-hidden="true">&rarr;</span>
      {% endif %}
    </li>
  </ul>
  {% endif %}

  {% if page.layout != "post" %}
  <div class="nav-left">
    <a class="nav-brand" href="/" {% if page.url == "/" %}aria-current="page"{% endif %}>Sam Younger</a>
  </div>
  <div class="nav-right">
    <a href="/about/" {% if page.url == "/about/" %}aria-current="page"{% endif %}>About</a>
    <a href="/blog/" {% if page.url == "/blog/" %}aria-current="page"{% endif %}>Writing</a>
  </div>
  {% endif %}

</nav>
