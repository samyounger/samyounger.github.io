<head>
  {% if jekyll.environment == 'production' %}
  {% include analytics.html %}
  {% endif %}
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <link rel="shortcut icon" type="image/png" href="{{ "/assets/images/favicon.ico" | prepend: site.baseurl }}">

  <title>
    {% if page.layout == "post" %}
    {{ page.title }}
    {% elsif page.title %}
    {{ site.title }} | {{ page.title }}
    {% else %}
    {{ site.title }}
    {% endif %}
  </title>

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Muli:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
  {% if page.pagefind %}
  <link rel="stylesheet" href="{{ "/pagefind/pagefind-component-ui.css" | prepend: site.baseurl }}">
  {% endif %}
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

  <script src="{{ "/assets/javascripts/menu.js" | prepend: site.baseurl }}" defer></script>
  <script src="{{ "/assets/javascripts/main.js" | prepend: site.baseurl }}" defer></script>
</head>
