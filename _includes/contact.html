<section id="contact">
  <div class="content">
    <h2>Get in touch</h2>
    <p>Email is the simplest route.</p>
    <p><a class="contact-email" href="mailto:{{ site.email }}">{{ site.email }}</a></p>
    <ul>
      {% for network in site.social %}
      <li class="button">
        <a href="{{ network.url }}" target="_blank" rel="noopener noreferrer"><span class="network-name">{{ network.title }}</span><span class="sr-only"> opens in a new tab</span></a>
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
