---
layout: default
---

{% include nav.html section="default" %}
<main id="main-content" tabindex="-1" {% unless page.no_pagefind %}data-pagefind-body{% endunless %}>
  <div class="navSpacer"></div>
  <article id="blog-post">
    <div class="blog-post-head">
      <h1 class="blog_title">{{ page.title }}</h1>
        <ul class="tags">
          {% for category in page.categories %}
          <li>{{ category }}</li>
          {% endfor %}
        </ul>
        <p class="blog_date">{{ page.date | date_to_long_string }}</p>
    </div>
    {{ content }}

    {% include disqus.html %}

  </article>
</main>
